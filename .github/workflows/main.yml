name: Build Cross-Platform (Linux, Windows, macOS)

on:
  push:
    tags:
      - "*.*.*.*"

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            is_linux: true

          # 2. Windows Intel 64-bit
          - os: windows-latest
            arch: x86_64
            is_windows: true

          # 3. macOS Intel (x86_64)
          - os: macos-13
            arch: x86_64
            is_mac: true

          # 4. macOS Apple Silicon (arm64)
          - os: macos-14
            arch: arm64
            is_mac: true

    # Wenn es Linux ist, erzwingen wir den Alpine-Container für Musl-Portabilität
    container: ${{ matrix.is_linux && 'alpine:3.20' || null }}

    steps:
    # --- PLATTFORMSPEZIFISCHE SYSTEMABHÄNGIGKEITEN ---
    - name: [Linux] Install Native Deps
      if: matrix.is_linux
      run:  |
          apk add --no-cache curl gcc g++ gmp-dev ncurses-dev libffi-dev make xz gzip tar perl git bash sudo binutils-gold
          apk add --no-cache zlib zlib-dev zlib-static gmp gmp-dev ncurses-static

    - name: Checkout code  
      run: git clone https://codeberg.org/uzu/zwirn

    # --- COMPILER TOOLCHAINS EINRICHTEN ---
    - name: [Non-Linux] Set up Rust
      if: "!matrix.is_linux"
      uses: dtolnay/rust-toolchain@stable

    - name: [Linux] Install Rust (musl-native)
      if: matrix.is_linux
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://rustup.rs | sh -s -- -y --default-toolchain stable
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: [Non-Linux] Set up Haskell (GHC 9.12.2)
      if: "!matrix.is_linux"
      uses: haskell/actions/setup@v2
      with:
        ghc-version: '9.12.2'
        cabal-version: '3.14.2.0'

    - name: [Linux] Set up Haskell
      if: matrix.is_linux
      uses: haskell/ghcup-setup@v1
      run: |
          ghcup install ghc '9.12.2'
          ghcup set ghc '9.12.2'
          ghcup install cabal '3.14.2.0'

    - name: Build Rust Static Library
      shell: bash
      run: |
        cd haskell-doux/doux-ffi
        cargo build --release

    - name: [Linux/macOS] Generate cabal.project.local
      if: matrix.is_linux || matrix.is_mac
      shell: bash
      run: |
        echo "package haskell-doux" > cabal.project.local
        echo "  extra-lib-dirs: ${{ github.workspace }}/haskell-doux/doux-ffi/target/release" >> cabal.project.local
        cat cabal.project.local

    - name: [Windows] Generate cabal.project.local
      if: matrix.is_windows
      shell: bash
      run: |
        # Windows nutzt Backslashes; wir müssen den GitHub Workspace-Pfad für Cabal escapen
        RAW_PATH="${{ github.workspace }}/haskell-doux/doux-ffi/target/release"
        WIN_PATH=$(echo "$RAW_PATH" | sed 's/\//\\/g')
        
        echo "package haskell-doux" > cabal.project.local
        echo "  extra-lib-dirs: $WIN_PATH" >> cabal.project.local
        cat cabal.project.local

    - name: Build Haskell Project
      shell: bash
      run: |
        cabal update
        cabal build zwirn-doux
